### Deploy compose — lives at /root/pibconfins/ on the Hostinger VPS.
### Use: `docker compose -f docker-compose.yml up -d`
### GHA runs this after pulling the latest image from ghcr.

services:
  pibconfins:
    image: ghcr.io/eusoubrasileiro/pibconfins-site:latest
    pull_policy: always
    restart: unless-stopped
    networks:
      - network_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      # HTTPS router (no StripPrefix — app knows its base via Vite `base: "/pibconfins/"`)
      - "traefik.http.routers.pibconfins.rule=Host(`amiticia.cc`) && PathPrefix(`/pibconfins`)"
      - "traefik.http.routers.pibconfins.entrypoints=websecure"
      - "traefik.http.routers.pibconfins.tls.certresolver=myresolver"
      # HTTP → HTTPS redirect for the same path
      - "traefik.http.routers.pibconfins-redirect.rule=Host(`amiticia.cc`) && PathPrefix(`/pibconfins`)"
      - "traefik.http.routers.pibconfins-redirect.entrypoints=web"
      - "traefik.http.routers.pibconfins-redirect.middlewares=pibconfins-https"
      - "traefik.http.middlewares.pibconfins-https.redirectscheme.scheme=https"
      # Service port + health (the dashboard root responds under /pibconfins/)
      - "traefik.http.services.pibconfins.loadbalancer.server.port=3000"
      - "traefik.http.services.pibconfins.loadbalancer.healthcheck.path=/pibconfins/"
      - "traefik.http.services.pibconfins.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.pibconfins.loadbalancer.healthcheck.timeout=3s"

networks:
  network_public:
    external: true
    name: network_public
