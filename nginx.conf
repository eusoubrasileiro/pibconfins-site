server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # SPA fallback for /pibconfins/* — vite base is /pibconfins/, so all assets and
  # client routes live under that prefix. Anything not found falls back to index.html.
  location /pibconfins/ {
    try_files $uri $uri/ /pibconfins/index.html;
  }

  location /pibconfins/assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /pibconfins/index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Bare /pibconfins (no trailing slash) → redirect to /pibconfins/
  location = /pibconfins {
    return 301 /pibconfins/;
  }
}
